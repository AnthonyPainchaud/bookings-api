name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Bookings.sln

      - name: Build
        run: dotnet build Bookings.sln --no-restore -c Release

      # Integration tests spin up a real PostgreSQL container via Testcontainers;
      # ubuntu-latest runners have Docker available natively, so this needs no
      # extra setup.
      - name: Test
        run: dotnet test Bookings.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
